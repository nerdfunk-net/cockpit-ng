version: '3.8'

services:
  # Redis - Message broker and result backend
  redis:
    image: redis:7-alpine
    container_name: cockpit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass changeme
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=changeme

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: cockpit-celery-worker
    command: celery -A celery_worker worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      - COCKPIT_REDIS_HOST=redis
      - COCKPIT_REDIS_PORT=6379
      - COCKPIT_REDIS_PASSWORD=changeme
      - CELERY_MAX_WORKERS=4
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: cockpit-celery-beat
    command: celery -A celery_beat beat --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      - COCKPIT_REDIS_HOST=redis
      - COCKPIT_REDIS_PORT=6379
      - COCKPIT_REDIS_PASSWORD=changeme
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Flower - Celery monitoring (optional)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: cockpit-flower
    command: celery -A celery_worker flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app/backend
    environment:
      - COCKPIT_REDIS_HOST=redis
      - COCKPIT_REDIS_PORT=6379
      - COCKPIT_REDIS_PASSWORD=changeme
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
