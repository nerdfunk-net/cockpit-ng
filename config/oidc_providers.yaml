# OIDC Providers Configuration
# Configure multiple OpenID Connect providers for Single Sign-On

providers:
  # Corporate Keycloak Instance - Example configuration
  corporate:
    enabled: true
    name: "Corporate SSO"
    description: "Login with your corporate account"
    icon: "building"  # Icon identifier for UI
    display_order: 1
    
    # OpenID Connect Configuration
    discovery_url: "http://127.0.0.1:7080/realms/cockpit/.well-known/openid-configuration"
    client_id: "cockpit"
    client_secret: "QihKtC9YCU6TVPV2oOlNrEoqZXF83Ix9"
    redirect_uri: "http://localhost:3000/login/callback"  # Leave empty to use default from backend URL
    
    # OAuth Scopes
    scopes:
      - openid
      - profile
      - email
      - offline_access
    
    # Claim Mapping (how to extract user info from ID token)
    claim_mappings:
      username: "preferred_username"
      email: "email"
      name: "name"
      groups: "groups"  # Optional: for future role mapping
    
    # User Provisioning
    auto_provision: true
    default_role: "user"  # Role assigned to new users
    username_prefix: ""  # Optional: prefix to avoid username conflicts

  # Development Keycloak Instance - Example configuration
  development:
    enabled: false
    name: "Dev Environment SSO"
    description: "Login with your development account"
    icon: "code"
    display_order: 2
    
    discovery_url: "http://127.0.0.1:7080/realms/dev/.well-known/openid-configuration"
    client_id: "cockpit-dev"
    client_secret: "dev-secret-123"
    redirect_uri: ""
    
    scopes:
      - openid
      - profile
      - email
    
    claim_mappings:
      username: "preferred_username"
      email: "email"
      name: "name"
    
    auto_provision: true
    default_role: "user"
    username_prefix: ""

# Global OIDC Settings
global:
  # Allow fallback to traditional username/password login
  allow_traditional_login: true
  
  # Session timeout for OIDC users (minutes)
  session_timeout: 480
  
  # Automatically redirect to OIDC if only one provider is enabled
  auto_redirect_single_provider: false
